<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#151619" />
    <title>Baek Junho Terminal</title>
    <meta
      name="description"
      content="Single-screen interactive terminal profile for Baek Junho."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <a class="skip-link" href="#main-content" data-i18n="skipToMain">Skip to main content</a>
    <div class="cursor-light" aria-hidden="true"></div>
    <div class="shell">
      <header class="titlebar">
        <div class="title-group">
          <div class="traffic">
            <span class="dot dot-red"></span>
            <span class="dot dot-yellow"></span>
            <span class="dot dot-green"></span>
          </div>
          <div class="title">baekjunho.terminal.session</div>
        </div>
        <div class="title-actions">
          <button id="lang-toggle" class="lang-toggle" type="button">KO</button>
          <a class="title-link" href="https://github.com/junho-baek" target="_blank" rel="noreferrer">
            github
          </a>
        </div>
      </header>

      <main id="main-content" class="viewport">
        <section class="terminal-frame">
          <div class="terminal-head">
            <span data-i18n="terminalPath">user@junho:~$ cat who_is_junho_baek.md</span>
            <span class="status" data-i18n="statusReady">ready</span>
          </div>
          <div id="terminal-output" class="terminal-output" aria-live="polite"></div>
        </section>
      </main>

      <footer class="command-bar-wrap">
        <div class="metrics">
          <span><em data-i18n="metricModeLabel">MODE</em>: <strong id="metric-mode">/who-is-junho-baek</strong></span>
          <span><em data-i18n="metricLangLabel">LANG</em>: <strong id="metric-lang">EN</strong></span>
          <span><em data-i18n="metricSourceLabel">SOURCE</em>: <strong>figlet-style terminal render</strong></span>
        </div>
        <button id="command-bar" class="command-bar" type="button" aria-expanded="false">
          <span class="command-prompt">&gt;</span>
          <span id="command-label" class="command-label" data-i18n="commandOpen">Open command modes</span>
          <span class="command-run" data-i18n="commandRun">Run</span>
        </button>
      </footer>
    </div>

    <div id="palette-backdrop" class="palette-backdrop hidden"></div>
    <section id="palette" class="palette hidden" aria-label="Command palette">
      <div class="palette-head">
        <span data-i18n="paletteTitle">Select command</span>
        <span data-i18n="paletteHint">click or use arrow keys + enter</span>
      </div>
      <div id="palette-list" class="palette-list"></div>
    </section>

    <script src="./app.js"></script>
  </body>
</html>
